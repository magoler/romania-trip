<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>טיול לרומניה</title>
<meta name="theme-color" content="#7a1f2b">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:"Heebo",system-ui,Arial,sans-serif;min-height:100vh;display:flex;
    align-items:center;justify-content:center;padding:24px;
    background:linear-gradient(135deg,#7a1f2b,#5c151f)}
  .box{background:#fff;border-radius:22px;padding:34px 26px;width:100%;max-width:360px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .flag{font-size:2.4rem}
  h1{margin:6px 0 2px;color:#7a1f2b;font-size:1.55rem;font-weight:900}
  p{margin:0 0 18px;color:#6f655c}
  input{width:100%;font-size:1.4rem;text-align:center;letter-spacing:.3em;padding:14px;
    border:2px solid #e7ddcf;border-radius:14px;outline:none;font-family:inherit}
  input:focus{border-color:#c79a3a}
  button{width:100%;margin-top:14px;background:#7a1f2b;color:#fff;border:none;font-size:1.2rem;
    font-weight:800;padding:14px;border-radius:14px;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.6}
  .err{display:none;color:#c0392b;margin-top:12px;font-weight:700}
  .rm{margin-top:14px;color:#6f655c;font-size:.95rem;display:flex;gap:8px;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="box">
  <div class="flag">🇷🇴</div>
  <h1>הטיול שלנו ברומניה</h1>
  <p>הזינו סיסמה כדי לצפות במדריך</p>
  <input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="סיסמה">
  <button id="go">כניסה ←</button>
  <label class="rm"><input type="checkbox" id="rm" checked style="width:auto;letter-spacing:0;padding:0">זכור אותי במכשיר הזה</label>
  <div id="err" class="err">סיסמה שגויה, נסו שוב</div>
</div>

const ITER=200000;
async function decryptWith(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:SALT,iterations:ITER,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:IV},key,CT);
  return new TextDecoder().decode(buf);
}
async function unlock(pw,remember,auto){
  const btn=document.getElementById("go"); btn.disabled=true;
  try{
    const html=await decryptWith(pw);
    if(remember) localStorage.setItem("ro_pw",pw);
    document.open(); document.write(html); document.close();
  }catch(e){
    btn.disabled=false;
    if(auto){ localStorage.removeItem("ro_pw"); }
    else{ const i=document.getElementById("pw"); document.getElementById("err").style.display="block"; i.value=""; i.focus(); }
  }
}
document.getElementById("go").onclick=()=>unlock(document.getElementById("pw").value.trim(),
  document.getElementById("rm").checked,false);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("go").click();});
const saved=localStorage.getItem("ro_pw");
if(saved){ unlock(saved,false,true); } else { document.getElementById("pw").focus(); }
</script>
